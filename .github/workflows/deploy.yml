name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "production"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install flyctl ────────────────────────────────────────────────────
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # ── Create app if it doesn't exist yet ───────────────────────────────
      - name: Create Fly app (first-time only)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl apps list | grep -q "${{ vars.FLY_APP_NAME }}" \
            || flyctl apps create "${{ vars.FLY_APP_NAME }}" --org personal
        continue-on-error: true

      # ── Create persistent volume (first-time only) ────────────────────────
      # Volume must exist before deploy; this is a no-op if it already exists.
      - name: Ensure data volume exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl volumes list \
            --app "${{ vars.FLY_APP_NAME }}" \
            | grep -q "myevents_data" \
            || flyctl volumes create myevents_data \
                --app "${{ vars.FLY_APP_NAME }}" \
                --region "${{ vars.FLY_REGION || 'arn' }}" \
                --size 1
        continue-on-error: true

      # ── Push secrets to Fly (idempotent) ──────────────────────────────────
      - name: Set Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl secrets set \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            APP_URL="${{ vars.APP_URL }}" \
            --app "${{ vars.FLY_APP_NAME }}" \
            --stage   # --stage: queues secrets, applied atomically at deploy

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --app "${{ vars.FLY_APP_NAME }}" \
            --region "${{ vars.FLY_REGION || 'arn' }}" \
            --remote-builder \
            --strategy rolling \
            --wait-timeout 120
