name: Deploy to Fly.io

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - development
      fly_app_name:
        description: "Fly.io app name (overrides environment default)"
        required: false
        default: ""
      fly_region:
        description: "Primary region (arn=Stockholm, cdg=Paris, lhr=London)"
        required: false
        default: "arn"
      app_url:
        description: "Public URL — e.g. https://myevents.fly.dev (overrides environment default)"
        required: false
        default: ""

env:
  # If fly_app_name input is blank, fall back to the environment-scoped variable
  FLY_APP:    ${{ inputs.fly_app_name != '' && inputs.fly_app_name || vars.FLY_APP_NAME }}
  FLY_REGION: ${{ inputs.fly_region || 'arn' }}
  APP_URL:    ${{ inputs.app_url != '' && inputs.app_url || vars.APP_URL }}

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # ← loads secrets/vars scoped to chosen env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly app (first-time only)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl apps list | grep -q "${{ env.FLY_APP }}" \
            || flyctl apps create "${{ env.FLY_APP }}" --org personal
        continue-on-error: true

      - name: Ensure data volume exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl volumes list --app "${{ env.FLY_APP }}" \
            | grep -q "myevents_data" \
            || flyctl volumes create myevents_data \
                --app    "${{ env.FLY_APP }}" \
                --region "${{ env.FLY_REGION }}" \
                --size   1 \
                --yes
                --size   1 \
                --yes
        continue-on-error: true

      - name: Set Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl secrets set \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            APP_URL="${{ env.APP_URL }}" \
            --app "${{ env.FLY_APP }}" \
            --stage

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --app            "${{ env.FLY_APP }}" \
            --region         "${{ env.FLY_REGION }}" \
            --remote-builder \
            --strategy       rolling \
            --wait-timeout   120


